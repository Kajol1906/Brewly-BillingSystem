spring.application.name=Brewly

# Import secrets from .env.properties (gitignored)
spring.config.import=optional:file:.env.properties

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/brewly_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:67961906}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=${PORT:8080}

jwt.secret=${JWT_SECRET:brewly_secret_key_123456}
jwt.expiration=86400000
spring.jpa.properties.hibernate.format_sql=true

# Google OAuth (client id & secret loaded from .env.properties)
google.redirect.uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/google/callback}



